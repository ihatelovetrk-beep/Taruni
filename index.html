*{
margin:0;
padding:0;
box-sizing:border-box;

}

body{
background:#f2f2f2;
min-height:100vh;
display:flex;
justify-content:center;
align-items:center;
padding:20px;
}

.card{
width:100%;
max-width:420px;
background:#fff;
border-radius:30px;
padding:30px 20px;
text-align:center;

.profile{

}

.title{

margin-bottom:25px;

}

.telegram-btn{

width:100%;

color:#fff;
text-decoration:none;
font-size:22px;
font-weight:700;
border-radius:50px;
margin:20px 0;
}

.telegram-btn:hover{
opacity:.95;
}

.countdown{
display:grid;
grid-template-columns:repeat(4,1fr);
gap:10px;
margin:25px 0;
}

.box{
background:#fafafa;
border-radius:15px;
padding:15px 5px;
border:1px solid #eee;
}

.num{
font-size:32px;
font-weight:800;
color:#ff3366;
}

.label{
font-size:11px;
font-weight:700;
color:#d600ff;
margin-top:5px;
}

.footer{
margin-top:20px;
font-size:18px;
font-weight:700;
}

.footer span{
color:#ff3366;
}

@media(max-width:480px){

font-size:24px;
}

padding:16px;
